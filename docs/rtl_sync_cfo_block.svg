<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180" role="img" aria-labelledby="svgTitle svgDesc">
  <title id="svgTitle">RTL Design Block Diagram for frac_cfo_frame_corrector_top</title>
  <desc id="svgDesc">Top-level input and output ports, internal submodules, and sample/control/status connections.</desc>

  <style>
    .title-small { font-size: 25px; font-weight: 900; fill: #0B1220; letter-spacing: -0.02em; }
    .label { font-size: 18px; font-weight: 800; fill: #0B1220; }
    .label-sm { font-size: 14px; font-weight: 800; fill: #0B1220; }
    .label-xs { font-size: 12px; font-weight: 800; fill: #172033; }
    .muted { font-size: 13px; font-weight: 700; fill: #475467; }
    .port { font-size: 14px; font-weight: 800; fill: #172033; }
    .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 12px; font-weight: 700; fill: #172033; }
    .box { stroke: #0B1220; stroke-width: 2.2; rx: 18; ry: 18; }
    .inner { stroke: #0B1220; stroke-width: 1.8; rx: 13; ry: 13; }
    .thin { stroke: #0B1220; stroke-width: 1.4; rx: 10; ry: 10; }
    .solid { stroke: #0B1220; stroke-width: 2.6; fill: none; marker-end: url(#arrowSolid); }
    .solid-no-arrow { stroke: #0B1220; stroke-width: 2.4; fill: none; }
    .dash { stroke: #0B1220; stroke-width: 2.1; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrowDash); }
    .dash-no-arrow { stroke: #0B1220; stroke-width: 2.0; fill: none; stroke-dasharray: 8 7; }
    .port-dot { fill: white; stroke: #0B1220; stroke-width: 2; }
    .section-title { font-size: 18px; font-weight: 950; fill: #0B1220; letter-spacing: 0.02em; }
    .legend-text { font-size: 16px; font-weight: 850; fill: #172033; }
    text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  </style>


        <title id="svgTitle">RTL Design Block Diagram for frac_cfo_frame_corrector_top</title>
        <desc id="svgDesc">Top-level input and output ports, internal submodules, and sample/control/status connections.</desc>

        <defs>
          <marker id="arrowSolid" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
            <path d="M2,2 L10,6 L2,10 Z" fill="#0B1220" />
          </marker>
          <marker id="arrowDash" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
            <path d="M2,2 L10,6 L2,10 Z" fill="#0B1220" />
          </marker>
          <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="5" dy="6" stdDeviation="0" flood-color="#0B1220" flood-opacity="0.18" />
          </filter>
        </defs>

