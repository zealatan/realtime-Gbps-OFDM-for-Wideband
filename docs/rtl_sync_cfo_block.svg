<svg viewBox="0 0 720 680" width="720" height="680" xmlns="http://www.w3.org/2000/svg" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace">
<defs>
  <marker id="a" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#8b949e"/></marker>
  <marker id="b" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#58a6ff"/></marker>
  <marker id="g" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#56d364"/></marker>
  <marker id="d" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#e3b341"/></marker>
</defs>

<!-- background -->
<rect width="720" height="680" fill="#0d1117"/>

<!-- ── title ──────────────────────────────────────────────────── -->
<text x="360" y="18" text-anchor="middle" font-size="11" fill="#8b949e" letter-spacing="1">frac_cfo_frame_corrector_top  ·  RTL_SYNC Phase-1 Synchronizer</text>

<!-- ── input signals ──────────────────────────────────────────── -->
<text x="160" y="36" text-anchor="middle" font-size="9" fill="#8b949e">aclk  ·  aresetn  ·  start</text>
<line x1="100" y1="38" x2="100" y2="52" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#a)"/>
<line x1="160" y1="38" x2="160" y2="52" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#b)"/>
<line x1="220" y1="38" x2="220" y2="52" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#a)"/>
<text x="100" y="34" text-anchor="middle" font-size="8" fill="#8b949e">ctrl</text>
<text x="160" y="34" text-anchor="middle" font-size="8.5" fill="#58a6ff">s_axis IQ [31:0]</text>
<text x="220" y="34" text-anchor="middle" font-size="8" fill="#8b949e">threshold</text>

<!-- ═══ BLOCK 1 — iq_frame_buffer ════════════════════════════════ -->
<rect x="40" y="52" width="320" height="72" rx="5" fill="#0c2d6b33" stroke="#1f6feb" stroke-width="2"/>
<text x="200" y="74" text-anchor="middle" font-size="11" font-weight="bold" fill="#58a6ff">iq_frame_buffer</text>
<text x="200" y="90" text-anchor="middle" font-size="8.5" fill="#8b949e">AXI-Stream capture  ·  4096 × 32-bit BRAM</text>
<text x="200" y="105" text-anchor="middle" font-size="8.5" fill="#8b949e">rd_en / rd_addr / rd_data  (FSM-muxed read port)</text>

<!-- shared bus arrow right -->
<line x1="360" y1="88" x2="600" y2="88" stroke="#388bfd" stroke-width="1.5" stroke-dasharray="5,3"/>
<line x1="600" y1="88" x2="600" y2="460" stroke="#388bfd" stroke-width="1.5" stroke-dasharray="5,3"/>
<text x="605" y="275" font-size="8" fill="#388bfd" transform="rotate(90,605,275)">buf_rd_data [31:0]  ·  shared bus  (FSM mux)</text>

<!-- arrow down buf→fd -->
<line x1="200" y1="124" x2="200" y2="146" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>
<text x="205" y="138" font-size="7.5" fill="#484f58">capture_done</text>

<!-- ═══ BLOCK 2 — frame_detector ═════════════════════════════════ -->
<rect x="40" y="146" width="320" height="72" rx="5" fill="#0c2d6b44" stroke="#388bfd" stroke-width="2"/>
<text x="200" y="168" text-anchor="middle" font-size="11" font-weight="bold" fill="#388bfd">frame_detector</text>
<text x="200" y="184" text-anchor="middle" font-size="8.5" fill="#8b949e">sliding-window energy  ·  |I|²+|Q|² accumulation</text>
<text x="200" y="199" text-anchor="middle" font-size="8.5" fill="#8b949e">threshold compare  ·  hit_count hysteresis</text>
<!-- bus branch to fd -->
<line x1="600" y1="182" x2="362" y2="182" stroke="#388bfd" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#b)"/>
<!-- fd outputs -->
<line x1="360" y1="170" x2="440" y2="170" stroke="#56d364" stroke-width="1.5" marker-end="url(#g)"/>
<text x="445" y="167" font-size="8.5" fill="#56d364">frame_index [11:0]</text>
<text x="445" y="178" font-size="8.5" fill="#56d364">frame_found</text>

<!-- arrow down fd→tfc -->
<line x1="200" y1="218" x2="200" y2="254" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>
<text x="205" y="238" font-size="7.5" fill="#484f58">fd_done / FSM</text>

<!-- ═══ BLOCK 3 — timing_frac_cfo_top ════════════════════════════ -->
<rect x="22" y="254" width="550" height="228" rx="5" fill="#0c332022" stroke="#3fb950" stroke-width="2"/>
<text x="32" y="270" font-size="9" font-weight="bold" fill="#3fb950" letter-spacing="0.5">timing_frac_cfo_top</text>

<!-- timing_sync_top nested -->
<rect x="36" y="276" width="330" height="192" rx="4" fill="#12271822" stroke="#2ea043" stroke-width="1.5"/>
<text x="46" y="291" font-size="8.5" font-weight="bold" fill="#2ea043">timing_sync_top</text>

<!-- cp_autocorr_core -->
<rect x="50" y="298" width="300" height="46" rx="3" fill="#1c322644" stroke="#39d353" stroke-width="1.2"/>
<text x="200" y="318" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#39d353">cp_autocorr_core</text>
<text x="200" y="333" text-anchor="middle" font-size="8" fill="#8b949e">R(n) = Σ x[n+k]·x*[n+k−NSC]  ·  ACC_WIDTH=40</text>

<!-- timing_metric_core -->
<rect x="50" y="350" width="300" height="46" rx="3" fill="#1c322644" stroke="#39d353" stroke-width="1.2"/>
<text x="200" y="370" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#39d353">timing_metric_core</text>
<text x="200" y="385" text-anchor="middle" font-size="8" fill="#8b949e">M(n) = |P(n)|² / E(n)²  ·  METRIC_WIDTH=32</text>

<!-- peak_detector -->
<rect x="50" y="402" width="300" height="46" rx="3" fill="#1c322644" stroke="#39d353" stroke-width="1.2"/>
<text x="200" y="422" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#39d353">peak_detector</text>
<text x="200" y="437" text-anchor="middle" font-size="8" fill="#8b949e">max-metric lag  ·  INDEX_WIDTH=9  ·  NSC=256</text>

<!-- arrows inside timing_sync_top -->
<line x1="200" y1="344" x2="200" y2="350" stroke="#484f58" stroke-width="1" marker-end="url(#a)"/>
<line x1="200" y1="396" x2="200" y2="402" stroke="#484f58" stroke-width="1" marker-end="url(#a)"/>

<!-- frac_cfo_estimator -->
<rect x="378" y="276" width="180" height="192" rx="4" fill="#12271844" stroke="#56d364" stroke-width="1.5"/>
<text x="468" y="294" text-anchor="middle" font-size="9" font-weight="bold" fill="#56d364">frac_cfo</text>
<text x="468" y="307" text-anchor="middle" font-size="9" font-weight="bold" fill="#56d364">estimator</text>
<text x="468" y="328" text-anchor="middle" font-size="8" fill="#8b949e">CORDIC atan2</text>
<text x="468" y="341" text-anchor="middle" font-size="8" fill="#8b949e">(peak_corr_q,</text>
<text x="468" y="354" text-anchor="middle" font-size="8" fill="#8b949e"> peak_corr_i)</text>
<text x="468" y="374" text-anchor="middle" font-size="8.5" fill="#56d364">→ frac_phase</text>
<text x="468" y="387" text-anchor="middle" font-size="8.5" fill="#56d364">   Q1.15 [15:0]</text>
<text x="468" y="403" text-anchor="middle" font-size="7.5" fill="#8b949e">PHASE_WIDTH=16</text>
<text x="468" y="416" text-anchor="middle" font-size="7.5" fill="#8b949e">LATENCY=15</text>
<text x="468" y="432" text-anchor="middle" font-size="7.5" fill="#8b949e">peak_lag [8:0]</text>
<text x="468" y="445" text-anchor="middle" font-size="7.5" fill="#8b949e">peak_metric [31:0]</text>
<!-- peak_corr from timing_sync to estimator -->
<line x1="350" y1="372" x2="376" y2="372" stroke="#484f58" stroke-width="1.2" marker-end="url(#a)" stroke-dasharray="3,2"/>
<text x="352" y="367" font-size="7" fill="#484f58">corr_i/q</text>

<!-- bus branch to tfc -->
<line x1="600" y1="370" x2="574" y2="370" stroke="#388bfd" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#b)"/>

<!-- tfc outputs right -->
<line x1="558" y1="340" x2="618" y2="340" stroke="#56d364" stroke-width="1.5" marker-end="url(#g)"/>
<text x="620" y="336" font-size="8" fill="#56d364">peak_lag [8:0]</text>
<text x="620" y="347" font-size="8" fill="#56d364">peak_metric [31:0]</text>
<line x1="558" y1="390" x2="618" y2="390" stroke="#e3b341" stroke-width="1.5" marker-end="url(#d)"/>
<text x="620" y="386" font-size="8" fill="#e3b341">frac_phase [15:0]</text>
<text x="620" y="397" font-size="8" fill="#e3b341">Q1.15 · valid</text>

<!-- arrow tfc→corrector -->
<line x1="200" y1="482" x2="200" y2="518" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>
<text x="205" y="503" font-size="7.5" fill="#e3b341">frac_phase → step_word</text>
<text x="205" y="513" font-size="7" fill="#484f58">LOAD_NCO state</text>

<!-- ═══ BLOCK 4 — frac_cfo_corrector_top ═════════════════════════ -->
<rect x="22" y="518" width="550" height="120" rx="5" fill="#2d200022" stroke="#d29922" stroke-width="2"/>
<text x="32" y="534" font-size="9" font-weight="bold" fill="#d29922" letter-spacing="0.5">frac_cfo_corrector_top</text>

<!-- nco_phase_gen -->
<rect x="36" y="540" width="240" height="84" rx="4" fill="#3d2e0044" stroke="#e3b341" stroke-width="1.5"/>
<text x="156" y="558" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#e3b341">nco_phase_gen</text>
<text x="156" y="573" text-anchor="middle" font-size="8" fill="#8b949e">32-bit phase accumulator</text>
<text x="156" y="586" text-anchor="middle" font-size="8" fill="#8b949e">CORDIC sin/cos · LATENCY=15</text>
<text x="156" y="599" text-anchor="middle" font-size="8" fill="#8b949e">step = {−frac_phase, 16'h0}</text>
<text x="156" y="613" text-anchor="middle" font-size="7.5" fill="#e3b341">→ sin [15:0] · cos [15:0]</text>

<!-- complex_rotator -->
<rect x="290" y="540" width="268" height="84" rx="4" fill="#3d2e0044" stroke="#ffc53d" stroke-width="1.5"/>
<text x="424" y="558" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#ffc53d">complex_rotator</text>
<text x="424" y="573" text-anchor="middle" font-size="8" fill="#8b949e">I×cos − Q×sin  (>> SHIFT=15)</text>
<text x="424" y="586" text-anchor="middle" font-size="8" fill="#8b949e">Q×cos + I×sin  (>> SHIFT=15)</text>
<text x="424" y="599" text-anchor="middle" font-size="8" fill="#8b949e">AXI-Stream · back-pressure</text>
<text x="424" y="613" text-anchor="middle" font-size="7.5" fill="#ffc53d">NSC+CP_LEN = 288 samples out</text>

<!-- sin/cos nco→rotator -->
<line x1="276" y1="580" x2="288" y2="580" stroke="#e3b341" stroke-width="1.5" marker-end="url(#d)"/>
<text x="278" y="575" font-size="7" fill="#e3b341">sin·cos</text>

<!-- bus branch to corrector -->
<line x1="600" y1="460" x2="600" y2="578" stroke="#388bfd" stroke-width="1.5" stroke-dasharray="5,3"/>
<line x1="600" y1="578" x2="560" y2="578" stroke="#388bfd" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#b)"/>
<text x="562" y="572" font-size="7.5" fill="#388bfd">buf replay</text>

<!-- ── m_axis output ──────────────────────────────────────────── -->
<line x1="424" y1="638" x2="424" y2="658" stroke="#e3b341" stroke-width="2" marker-end="url(#d)"/>
<text x="424" y="672" text-anchor="middle" font-size="9" font-weight="bold" fill="#e3b341">m_axis_tdata [31:0]  ·  tvalid · tready · tlast</text>

<!-- done/busy -->
<line x1="100" y1="638" x2="100" y2="658" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#a)"/>
<text x="100" y="671" text-anchor="middle" font-size="8" fill="#8b949e">done · busy · frame_error</text>

<!-- ── FSM strip ──────────────────────────────────────────────── -->
<text x="360" y="650" text-anchor="middle" font-size="7.5" fill="#484f58">FSM: IDLE → FILL → FRAME_DET → TIMING_CFO → LOAD_NCO → CORRECT → DONE</text>

</svg>
